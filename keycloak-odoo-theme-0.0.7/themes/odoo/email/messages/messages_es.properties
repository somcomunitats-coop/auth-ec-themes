emailVerificationSubject=Verificaci\u00F3n de email
emailVerificationBody=Alguien ha creado una cuenta de {2} con esta direcci\u00F3n de email. Si has sido t\u00FA, haz click en el enlace siguiente para verificar tu direcci\u00F3n de email.\n\n{0}\n\nEste enlace expirar\u00E1 en {1} minutos.\n\nSi t\u00FA no has creado esta cuenta, simplemente ignora este mensaje.
emailVerificationBodyHtml=<p>Alguien ha creado una cuenta de {2} con esta direcci\u00F3n de email. Si has sido t\u00FA, haz click en el enlace siguiente para verificar tu direcci\u00F3n de email.</p><p><a href=\"{0}\">Enlace de verficaci\u00F3n de direcci\u00F3n de email</a></p><p>Este enlace expirar\u00E1 en {1} minutos.</p><p>Si t\u00FA no has creado esta cuenta, simplemente ignora este mensaje.</p>
passwordResetSubject=Reiniciar contrase\u00F1a
passwordResetBody=Alguien ha solicitado cambiar las credenciales de tu cuenta de {2}. Si has sido t\u00FA, haz clic en el enlace siguiente para reiniciarlas.\n\n{0}\n\nEste enlace expirar\u00E1 en {1} minutos.\n\nSi no quieres reiniciar tus credenciales, simplemente ignora este mensaje y no se realizar\u00E1 ning\u00FAn cambio.
passwordResetBodyHtml=<p>Hola,</p><p>Alguien ha solicitado cambiar las credenciales de tu cuenta de {2}. Si has sido t\u00FA, haz clic en el enlace siguiente para reiniciarlas.</p><p><a href=\"{0}\">Enlace para actualizar contrase\u00F1a</a></p><p>Este enlace expirar\u00E1 en {1} minutos.</p><p>Si no quieres reiniciar tus credenciales, simplemente ignora este mensaje y no se realizar\u00E1 ning\u00FAn cambio.</p>
executeActionsSubject=[Som Comunitats] Configurar app de la Comunidad Energ\u00e9tica
executeActionsBody=Hola {6}, Recibes este correo porque alguna persona administradora ha iniciado el proceso de configuraci\u00f3n de tu cuenta de usuaria para el acceso a la Plataforma de Somos Comunidades https://somcomunitats.coop/plataforma/. Estas son tus credenciales de acceso a los diferentes recursos de la Plataforma: Usuario: {5}, Contrase\u00f1a: Para definir tu contrase\u00f1a debes seguir este proceso {0}. Nota: Este enlace caducar\u00e0 en {4}. Al final de este proceso de definici\u00f3n de contrase\u00f1a, te redirigiremos a la p\u00e1gina de nuestra web de Somos Comunidades https://somcomunitats.coop/entrar donde encontrar\u00e1s el acceso a los diferentes recursos para las personas y entidades registradas en la Plataforma. Para cualquier duda puedes contactar con nuestro equipo de soporte enviando un correo a soporte@somcomunitats.coop. Atentamente, Equipo de Somos Comunidades Recursos y Preguntas Frecuentes https://somcomunitats.coop/recursos/
executeActionsBodyHtml=<p> Hola {6} {7}, </p> <p> Recibes este correo porque {8}, ha iniciado el proceso para que puedas entrar en la aplicaci\u00f3n m\u00f3vil de Som Comunitats.  </p> <p> Estas son <b>tus credenciales de acceso</b> a la app: </p> <ul> <li> <b>Usuaria/o:</b> {5} </li> <li> <b>Contrase\u00f1a:</b> Para definirla <a href=\"{0}\">sigue este enlace</a> (caducar\u00e1 en {4}) </li> </ul> <p> Desc\u00e1rgate la aplicaci\u00f3n en <a href="https://play.google.com/store/apps/details?id=com.appsomcomunitats&hl=ca">Google Play</a> para Android o en <a href="https://apps.apple.com/es/app/som-comunitats/id6748384288">App Store</a> para iPhone y entra para visualizar el impacto positivo que est\u00e1is generando.  </p> <p> Para cualquier duda puedes explorar la p\u00e1gina web con los <a href="https://somcomunitats.coop/es/app/"> detalles de la app</a> o contactar con nuestro equipo de soporte enviando un correo a <a href="mailto:{9}">la administradora</a> de tu Comunidad.  </p> </br> <p> Atentamente,<br> Equipo de {8}<br> <a href="https://somcomunitats.coop/es/recursos/">Recursos y Preguntes Frecuentes</a> </p>
