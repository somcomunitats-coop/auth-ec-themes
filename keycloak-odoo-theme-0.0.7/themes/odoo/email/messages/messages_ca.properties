emailVerificationSubject=Verificaci\u00F3 d''email
emailVerificationBody=Alg\u00FA ha creat un compte de {2} amb aquesta adre\u00E7a de correu electr\u00F2nic. Si has estat tu, fes clic a l''enlla\u00E7 seg\u00FCent per verificar la teva adre\u00E7a de correu electr\u00F2nic.\n\n{0}\n\nAquest enlla\u00E7 expirar\u00E0 en {3}.\n\nSi tu no has creat aquest compte, simplement ignora aquest missatge.
emailVerificationBodyHtml=<p>Alg\u00FA ha creat un compte de {2} amb aquesta adre\u00E7a de correu electr\u00F2nic. Si has estat tu, fes clic a l''enlla\u00E7 seg\u00FCent per verificar la teva adre\u00E7a de correu electr\u00F2nic.</p><p><a href=\"{0}\">{0}</a></p><p> Aquest enlla\u00E7 expirar\u00E0 en {3}.</p><p> Si tu no has creat aquest compte, simplement ignora aquest missatge.</p>
passwordResetSubject=Reinicia contrasenya
passwordResetBody=Hola,\n\nAlg\u00FA ha demanat de canviar les credencials del teu compte de {2}. Si has estat tu, fes clic a l''enlla\u00E7 seg\u00FCent per a reiniciar-les.\n\n{0}\n\nAquest enlla\u00E7 expirar\u00E0 en {3}.\n\nSi no vols reiniciar les teves credencials, simplement ignora aquest missatge i no es realitzar\u00E0 cap canvi.
passwordResetBodyHtml=<p>Hola,</p><p>Alg\u00FA ha demanat de canviar les credencials del teu compte de {2}. Si has estat tu, fes clic a l''enlla\u00E7 seg\u00FCent per a reiniciar-les.</p><p><a href=\"{0}\">Enlla\u00E7 per actualitzar contrasenya</a></p><p>Aquest enlla\u00E7 expirar\u00E0 en {3}.</p><p>Si no vols reiniciar les teves credencials, simplement ignora aquest missatge i no es realitzar\u00E0 cap canvi.</p>
executeActionsSubject=[Som Comunitats] Configurar app de la Comunitat Energ\u00e8tica
executeActionsBody=Hola {6}, Reps aquest correu perqu\u00e8 alguna persona administradora ha iniciat el proc\u00e9s de configuraci\u00f3 del teu compte d''usu\u00e0ria per l''acc\u00E9s a la Plataforma de Som Comunitats https://somcomunitats.coop/plataforma/. Aquestes s\u00f3n les teves credencials d''acc\u00E9s als diferents recursos de la Plataforma: Usuari: {5}, Contrasenya: Per definir la teva contrasenya has de seguir aquest proc\u00e9s {0}. Nota: Aquest enlla\u00E7 caducar\u00e0 en {4}. Al final d''aquest proc\u00e9s de definici\u00f3 de contrasenya, et redirigirem a la p\u00e0gina de la nostra web de Som Comunitats https://somcomunitats.coop/entrar on trobar\u00e0s l''acc\u00e9s als diferents recursos per a persones i entitats registrades a la Plataforma. Per qualsevol dubte pots contactar amb el nostre equip de suport enviant un correu a suport@somcomunitats.coop. Atentament, Equip de Som Comunitats, Recursos i Preguntes Freq\u00fcents https://somcomunitats.coop/recursos/
executeActionsBodyHtml= <p> Hola {6} {7}, </p> <p> Reps aquest correu perqu\u00e8 des de {8}, s''ha iniciat el proc\u00e9s perqu\u00e8 puguis entrar a l''aplicaci\u00f3 m\u00f2bil de Som Comunitats.  </p> <p> Aquestes s\u00f3n <b>les teves credencials d''acc\u00E9s</b> a l''app: </p> <ul> <li> <b>Usuari\u00b7a:</b> {5} </li> <li> <b>Contrasenya:</b> Per definir-la  <a href=\"{0}\">segueix aquest enlla\u00E7.</a> (caducar\u00e0 en {4}) </li> </ul> <p> Descarrega''t l''aplicaci\u00f2 a <a href="https://play.google.com/store/apps/details?id=com.appsomcomunitats&hl=ca">Google Play</a> per a Android o a <a href="https://apps.apple.com/es/app/som-comunitats/id6748384288">App Store</a> per a iPhone i entra per visualitzar l''impacte positiu que esteu generant.  </p> <p> Per a qualsevol dubte podeu explorar la p\u00e0gina web amb els <a href="https://somcomunitats.coop/app/">detalls de l''app</a> o contactar amb el nostre equip de suport enviant un correu a <a href="mailto:{9}">l''administradora</a> de la vostra Comunitat.  </p> </br> <p> Atentament,<br> Equip de {8} <br> <a href="https://somcomunitats.coop/recursos/">Recursos i Preguntes Freq\u00fcents</a> </p>
